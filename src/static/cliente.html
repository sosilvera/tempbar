<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacer un Pedido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/cliente.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-6">
                <div class="card card-glass shadow-lg">
                    <div class="card-body p-4 p-md-5">
                        <h2 class="text-center mb-5 fw-bold" style="color: #00f2fe;">¿Qué vas a tomar?</h2>

                        <div id="mensaje-estado" class="alert d-none text-center rounded-4" role="alert"></div>

                        <form id="form-pedido" class="d-none">
                            <div class="mb-5">
                                <label for="nombre-cliente" class="form-label text-white-50 ms-1 small text-uppercase tracking-wider">Tu Nombre</label>
                                <input type="text" class="form-control custom-input" id="nombre-cliente" placeholder="Ej: Fede" autocomplete="off" required>
                            </div>

                            <div class="mb-5">
                                <label class="form-label text-white-50 ms-1 small text-uppercase tracking-wider mb-3">Elegí tu trago</label>
                                <div id="lista-tragos" class="d-flex flex-column gap-3">
                                    </div>
                            </div>

                            <div class="d-grid mt-5">
                                <button type="button" class="btn btn-neon" id="btn-enviar" onclick="enviarPedido()">Preparar Pedido</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/cliente.js"></script>
</body>
</html>
