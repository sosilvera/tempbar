<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barman en Casa - Menú</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4 text-primary">¿Qué vas a tomar hoy?</h1>
        
        <div class="row" id="menu-tragos">
            <div class="col-md-4 mb-3">
                <div class="card card-trago p-3">
                    <h5 class="card-title text-warning">Fernet con Coca</h5>
                    <p class="card-text text-muted small">El clásico argentino.</p>
                    <button class="btn btn-outline-primary btn-sm" onclick="abrirModalPedido(1, 'Fernet con Coca')">Pedir este</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="pedidoModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content bg-dark text-light">
          <div class="modal-header border-secondary">
            <h5 class="modal-title" id="modalTragoNombre">Pedir Trago</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="inputIdTrago">
            <div class="mb-3">
                <label for="inputNombreCliente" class="form-label">Tu Nombre</label>
                <input type="text" class="form-control bg-secondary text-white border-0" id="inputNombreCliente" placeholder="Ej: Fede">
            </div>
          </div>
          <div class="modal-footer border-secondary">
            <button type="button" class="btn btn-primary" onclick="enviarPedido()">Enviar Pedido al Barman</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/client.js"></script>
</body>
</html>
