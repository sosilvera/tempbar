<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maestro de Ingredientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/barman_dashboard.css" rel="stylesheet"> <link href="/static/css/barman_ingredientes.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4 mb-5">
        <div class="d-flex align-items-center mb-4">
            <button class="btn btn-outline-light rounded-circle me-3 p-2 d-flex align-items-center justify-content-center" style="width: 45px; height: 45px;" onclick="window.location.href='/tempbar/barman'">
                <i class="bi bi-arrow-left fs-5"></i>
            </button>
            <h2 class="fw-bold m-0 text-info">Ingredientes</h2>
        </div>

        <div id="alerta-ingredientes" class="alert d-none rounded-4 text-center glass-alert" role="alert"></div>

        <div class="card glass-card mb-4 border-0 shadow-lg position-sticky top-0" style="z-index: 10;">
            <div class="card-body p-3">
                <form id="form-ingrediente" class="d-flex gap-2" onsubmit="event.preventDefault(); crearIngrediente();">
                    <input type="text" class="form-control glass-input text-white fs-5" id="nuevo-ingrediente" placeholder="Buscar o agregar nuevo..." autocomplete="off" required>
                    <button type="submit" class="btn btn-neon-success rounded-4 px-4 d-flex align-items-center justify-content-center" id="btn-agregar">
                        <i class="bi bi-plus-lg fs-4"></i>
                    </button>
                </form>
            </div>
        </div>

        <div class="d-flex flex-column gap-3" id="lista-ingredientes">
            <div class="text-center mt-5 spinner-border text-info mx-auto" role="status"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/barman_ingredientes.js"></script>
</body>
</html>
