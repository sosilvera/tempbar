<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Tragos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4 mb-5">
        <a href="/barman" class="btn btn-secondary mb-4"><i class="bi bi-arrow-left"></i> Volver al Menú</a>
        
        <h2 class="mb-4 text-info"><i class="bi bi-glass-martini"></i> Diseñar Nuevo Trago</h2>
        
        <div class="row">
            <div class="col-md-5">
                <div class="card bg-dark border-secondary mb-4">
                    <div class="card-body">
                        <h4 class="card-title mb-4">1. Datos Principales</h4>
                        <div class="mb-3">
                            <label class="form-label">Nombre del Trago</label>
                            <input type="text" class="form-control bg-secondary text-white border-0" id="nombre-trago" placeholder="Ej: Cuba Libre" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Instrucciones de Preparación</label>
                            <textarea class="form-control bg-secondary text-white border-0" id="instrucciones-trago" rows="4" placeholder="Paso a paso para prepararlo..."></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-7">
                <div class="card bg-dark border-secondary">
                    <div class="card-body">
                        <h4 class="card-title mb-4">2. Armar Receta</h4>
                        
                        <form id="form-receta" class="row g-2 mb-4 d-flex align-items-end" onsubmit="event.preventDefault(); agregarIngredienteReceta();">
                            <div class="col-md-4">
                                <label class="form-label small text-muted">Ingrediente</label>
                                <select class="form-select bg-secondary text-white border-0" id="select-ingrediente" required>
                                    <option value="" disabled selected>Cargando...</option>
                                    </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small text-muted">Cantidad</label>
                                <input type="number" step="0.1" class="form-control bg-secondary text-white border-0" id="cantidad-ingrediente" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small text-muted">Unidad</label>
                                <select class="form-select bg-secondary text-white border-0" id="unidad-ingrediente" required>
                                    <option value="ml">ml</option>
                                    <option value="oz">oz</option>
                                    <option value="partes">partes</option>
                                    <option value="unidades">unidades</option>
                                    <option value="gr">gramos</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <button type="submit" class="btn btn-outline-info w-100"><i class="bi bi-plus-lg"></i></button>
                            </div>
                        </form>

                        <table class="table table-dark table-sm table-striped">
                            <thead>
                                <tr>
                                    <th>Ingrediente</th>
                                    <th>Cantidad</th>
                                    <th>Unidad</th>
                                    <th>Acción</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-receta">
                                </tbody>
                        </table>
                        <p id="mensaje-receta-vacia" class="text-muted small text-center">Aún no hay ingredientes en la receta.</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-grid mt-4">
            <button class="btn btn-success btn-lg" onclick="guardarTragoCompleto()">Guardar Trago en la Carta</button>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/barman_tragos.js"></script>
</body>
</html>
