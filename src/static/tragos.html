<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Trago</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/barman_dashboard.css" rel="stylesheet"> <link href="/static/css/barman_crear_trago.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4 mb-5">
        <div class="d-flex align-items-center mb-4">
            <button class="btn btn-outline-light rounded-circle me-3 p-2 d-flex align-items-center justify-content-center" style="width: 45px; height: 45px;" onclick="window.location.href='/tempbar/barman'">
                <i class="bi bi-arrow-left fs-5"></i>
            </button>
            <h2 class="fw-bold m-0 text-info">Nuevo Trago</h2>
        </div>

        <div id="alerta-trago" class="alert d-none rounded-4 text-center glass-alert mb-4" role="alert"></div>

        <div class="card glass-card shadow-lg border-0">
            <div class="card-body p-4">
                <div class="mb-4">
                    <label class="form-label text-white-50 small text-uppercase tracking-wider">Nombre del Trago</label>
                    <input type="text" class="form-control glass-input" id="nombre-trago" placeholder="Ej: Gin Tonic" required>
                </div>

                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <label class="form-label text-white-50 small text-uppercase tracking-wider m-0">Ingredientes</label>
                        <button type="button" class="btn btn-sm btn-neon-success rounded-pill px-3" onclick="abrirModalIngrediente()">
                            <i class="bi bi-plus-lg"></i> Agregar
                        </button>
                    </div>
                    
                    <div id="lista-receta" class="d-flex flex-column gap-2 mb-2">
                        <p id="mensaje-vacio" class="text-muted text-center small my-3">Aún no hay ingredientes.</p>
                    </div>
                </div>

                <div class="mb-5">
                    <label class="form-label text-white-50 small text-uppercase tracking-wider">Instrucciones</label>
                    <textarea class="form-control glass-input" id="instrucciones-trago" rows="4" placeholder="Paso a paso..." required></textarea>
                </div>

                <button type="button" class="btn-neon w-100" id="btn-crear-trago" onclick="crearTrago()">
                    Crear Trago
                </button>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalIngrediente" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass-modal border-0 shadow-lg">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title fw-bold text-info">Añadir a la receta</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4 position-relative">
                    <form id="form-modal" onsubmit="event.preventDefault(); confirmarIngrediente();">
                        
                        <div class="mb-3 position-relative">
                            <label class="form-label text-white-50 small">Ingrediente</label>
                            <input type="text" class="form-control glass-input" id="modal-nombre-ing" placeholder="Buscar o escribir nuevo..." autocomplete="off" required>
                            <ul id="sugerencias-ingredientes" class="list-group position-absolute w-100 shadow d-none" style="z-index: 1000; max-height: 150px; overflow-y: auto;">
                            </ul>
                        </div>

                        <div class="row g-2 mb-4">
                            <div class="col-6">
                                <label class="form-label text-white-50 small">Cantidad</label>
                                <input type="number" step="0.01" class="form-control glass-input" id="modal-cantidad" placeholder="Ej: 1.5" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label text-white-50 small">Unidad</label>
                                <input type="text" class="form-control glass-input" id="modal-unidad" placeholder="Ej: oz, ml, rodaja" required>
                            </div>
                        </div>

                        <button type="submit" class="btn-neon-success w-100 rounded-pill py-2" id="btn-confirmar-ing">
                            Agregar a la lista
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/barman_crear_trago.js"></script>
</body>
</html>
