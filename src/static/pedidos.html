<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos Pendientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <a href="/barman" class="btn btn-secondary mb-4">&larr; Volver al Menú</a>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Pedidos Pendientes</h2>
            <button class="btn btn-outline-info" onclick="cargarPedidos()">Actualizar Lista</button>
        </div>
        
        <div class="row" id="contenedor-pedidos">
            <div class="col-md-4 mb-3">
                <div class="card bg-dark border-warning p-3">
                    <h4 class="text-warning">Destornillador</h4>
                    <p><strong>Para:</strong> Juan</p>
                    <p class="small text-muted"><em>Instrucciones: Hielo, 30% Vodka...</em></p>
                    <button class="btn btn-success w-100" onclick="entregarPedido(1)">Entregado</button>
                </div>
            </div>
        </div>
    </div>
    <script src="js/barman_pedidos.js"></script>
</body>
</html>
